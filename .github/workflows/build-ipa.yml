name: Build JMHStream IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ipa:
    name: Build IPA (unsigned - ready for GBox)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: ios
        run: xcodegen generate --spec project.yml

      - name: Build Archive (unsigned)
        working-directory: ios
        run: |
          xcodebuild \
            -project JMHStream.xcodeproj \
            -scheme JMHStream \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "${{ github.workspace }}/build/JMHStream.xcarchive" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ENABLE_BITCODE=NO \
            archive | xcpretty

      - name: Package IPA (unsigned - for GBox signing)
        run: |
          mkdir -p build/Payload
          APP_PATH=$(find build/JMHStream.xcarchive/Products/Applications -name "*.app" | head -1)
          echo "App found at: $APP_PATH"
          cp -r "$APP_PATH" build/Payload/
          cd build
          zip -r "JMHStream-unsigned.ipa" Payload/
          echo "IPA created: $(du -sh JMHStream-unsigned.ipa)"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: JMHStream-IPA
          path: build/JMHStream-unsigned.ipa
          retention-days: 30

      - name: Show build info
        run: |
          echo "==============================="
          echo "  BUILD COMPLETED SUCCESSFULLY "
          echo "==============================="
          echo ""
          echo "IPA File: JMHStream-unsigned.ipa"
          echo "How to install:"
          echo "1. Download JMHStream-unsigned.ipa from artifacts"
          echo "2. Import into GBox on your iPhone"
          echo "3. GBox will sign and install it"
          echo "==============================="
