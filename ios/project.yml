name: JMHStream
options:
  bundleIdPrefix: com.jmhstream
  deploymentTarget:
    iOS: "15.0"
  xcodeVersion: "15"

targets:
  JMHStream:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - JMHStream
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jmhstream.app
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        INFOPLIST_FILE: JMHStream/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        ENABLE_BITCODE: "NO"
        SWIFT_VERSION: "5.9"
